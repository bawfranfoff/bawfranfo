<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ffoo'</title>

  <style>
    body {
      font-family: monospace;
      background: #111;
      color: #0f0;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 6px;
      background: #000;
      color: #0f0;
      border: 1px solid #0f0;
    }

    button {
      padding: 8px;
      background: #000;
      color: #0f0;
      border: 1px solid #0f0;
      cursor: pointer;
      margin-bottom: 20px;
    }

    h3 {
      margin-top: 30px;
    }
  </style>
</head>

<body>

<h2>FFC Control Panel</h2>

<button onclick="loadData()">REFRESH</button>

<div id="container"></div>

<script>
const READ_API  = "https://9ctvb06tbg.execute-api.ap-southeast-2.amazonaws.com/prod/ffc__i__";
const WRITE_API = "https://9ctvb06tbg.execute-api.ap-southeast-2.amazonaws.com/prod/ffc__o__";

let fo = [];

// ------------------- LOAD DATA -------------------
async function loadData() {
  const res = await fetch(READ_API);
  const data = await res.json();

  fo = data;
  render();
}

// ------------------- RENDER -------------------
function render() {
  const container = document.getElementById("container");
  container.innerHTML = "";

  fo.forEach((row, r) => {

    const title = document.createElement("h3");
    title.innerText = "Row " + r;
    container.appendChild(title);

    const grid = document.createElement("div");
    grid.className = "grid";

    for (let c = 1; c <= 16; c++) {
      const input = document.createElement("input");
      input.value = row["o" + String(c).padStart(2, '0')] || "";

      input.onchange = () => commit(r, c, input.value);

      grid.appendChild(input);
    }

    container.appendChild(grid);
  });
}

// ------------------- COMMIT -------------------
async function commit(row, col, value) {
  await fetch(WRITE_API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      row: row,
      col: col,
      value: value
    })
  });

  console.log("Updated:", row, col, value);
}

// ------------------- INIT -------------------
loadData();
</script>

</body>
</html>
